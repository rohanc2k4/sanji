<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale=1.0 + user-scalable=no disables browser auto-zoom on
         input focus and pinch-zoom; Sanji is desktop-first, so Cmd+/- still
         works for users who genuinely want to zoom and accessibility tools
         can override this at the OS level. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Sanji</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
