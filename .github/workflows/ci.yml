name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel a running CI run on the same ref when a fresh push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck (all packages)
        run: pnpm -r typecheck

  test:
    name: unit tests
    runs-on: ubuntu-latest
    env:
      # Force fast offline stubs so unit tests stay self-contained — no MiniLM
      # model download, no Anthropic call. Backend integration tests that flip
      # the runtime deps swap rely on these flags too.
      SANJI_FAKE_EMBED: '1'
      SANJI_OFFLINE_FAKE_LLM: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run unit tests (all packages)
        run: pnpm -r test

  build:
    name: prod build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build (skip workspaces without a build script)
        run: pnpm -r --if-present build
